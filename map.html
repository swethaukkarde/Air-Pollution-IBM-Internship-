<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Air Pollution Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Custom Map Page CSS -->
    <link rel="stylesheet" href="map.css">
</head>

<body>

<!-- HEADER -->
<header>
    <h2>AI Air Pollution Dashboard</h2>
    <p>Real AQI • Hotspots • SDG 13 Project</p>
</header>

<!-- CONTROLS (ONLY ONE BLOCK) -->
<div class="controls">
    <input type="text" id="searchBox" placeholder="Search a city...">
    <button id="searchBtn">Search</button>

    <select id="city1">
        <option value="">Compare: Select City 1</option>
    </select>

    <select id="city2">
        <option value="">Select City 2</option>
    </select>

    <button id="compareBtn">Compare</button>
    <button id="heatmapBtn">Toggle Heatmap</button>

    <br><br>

    <!-- FILTER BUTTONS -->
    <button id="showAllBtn">Show All</button>
    <button id="showHazBtn">Hazardous</button>
    <button id="showPoorBtn">Very Poor</button>
    <button id="showModerateBtn">Moderate</button>
    <button id="showGoodBtn">Good</button>
</div>


<!-- Comparison Result -->
<div id="compareResult"></div>

<!-- MAP DIV -->
<div id="map"></div>

<!-- FOOTER -->
<footer>
    <p>Created by Swetha M • AI for Sustainability • 1M1B Internship 2026</p>
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Heatmap plugin -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<!-- Your Map Logic -->
<script src="script.js"></script>

</body>
</html>
